name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

permissions: {}

jobs:
  test:
    name: Test ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    env:
      UV_HTTP_TIMEOUT: 120

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  python-quality:
    name: Python quality Ubuntu Python 3.13
    runs-on: ubuntu-latest

    env:
      UV_HTTP_TIMEOUT: 120

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install quality dependencies
        run: uv sync --frozen --extra dev

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run lint
        run: uv run ruff check .

      - name: Run type checks
        run: uv run mypy src/

      - name: Run security scan
        run: uv run bandit -r src/ -c pyproject.toml

  benchmark:
    name: Benchmark tests Ubuntu Python 3.13
    runs-on: ubuntu-latest

    env:
      UV_HTTP_TIMEOUT: 120

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install benchmark test dependencies
        run: uv sync --frozen --extra dev --extra benchmark

      - name: Run benchmark tests
        run: uv run pytest benchmark/tests -q

  benchmark-frontend-quality:
    name: Benchmark frontend quality
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: benchmark/viewer/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: benchmark/viewer/frontend
        run: npm ci

      - name: Run frontend typecheck
        working-directory: benchmark/viewer/frontend
        run: npm run typecheck

      - name: Run frontend lint
        working-directory: benchmark/viewer/frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: benchmark/viewer/frontend
        run: npm run build

      - name: Run frontend deadcode check
        working-directory: benchmark/viewer/frontend
        run: npm run deadcode
